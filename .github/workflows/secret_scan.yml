name: Secret Scanning

on:
  push:
  pull_request:

permissions: write-all

env:
  NODE_TLS_REJECT_UNAUTHORIZED: 0

jobs:
  secret_scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    container: catthehacker/ubuntu:act-22.04  # Uncomment it if you use it on Gitea

    steps:
      - name: Disable SSL Verify
        run: git config --global http.sslVerify false

      - name: Setup MTK Certification
        uses: https://gitea.mediatek.inc/actions/mtk-cert-action@v1.2.0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          token-setup-trivy: ${{ secrets.GH_TOKEN }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Generate human-readable report
        if: always()
        run: |
          echo "Generating human-readable report..."
          trivy fs . --format table --output trivy-report.txt --severity CRITICAL,HIGH || true
          trivy fs . --format json --output trivy-results.json --severity CRITICAL,HIGH || true

      - name: Upload Trivy scan results as artifacts
        uses: christopherhx/gitea-upload-artifact@v4
        if: always()
        with:
          name: trivy-security-scan-results
          path: |
            trivy-results.sarif
            trivy-report.txt
            trivy-results.json
          retention-days: 30

      - name: Display scan summary
        if: always()
        run: |
          echo "=== Trivy Scan Results Summary ==="
          if [ -f "trivy-results.sarif" ]; then
            echo "✅ SARIF file generated successfully"
            echo "📁 SARIF file size: $(du -h trivy-results.sarif | cut -f1)"
          fi
          if [ -f "trivy-report.txt" ]; then
            echo "✅ Human-readable report generated"
            echo "📁 Report file size: $(du -h trivy-report.txt | cut -f1)"
            echo ""
            echo "=== Security Issues Found ==="
            cat trivy-report.txt || echo "No issues found or report empty"
          fi
          echo ""
          echo "📊 All results available in artifacts for download"
